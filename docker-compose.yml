version: '3.8'
services:
  postgres:
    image: postgres:15
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
  nats:
    image: nats:2
    ports:
      - '4222:4222'
  minio:
    image: minio/minio
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000'
      - '9001:9001'
  auth-service:
    build: ./services/auth-service
    depends_on:
      - postgres
      - nats
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      NATS_URL: ${NATS_URL}
      S3_ENDPOINT: ${S3_ENDPOINT}
    ports:
      - '3001:3000'
  appointments-service:
    build: ./services/appointments-service
    depends_on:
      - postgres
      - nats
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      NATS_URL: ${NATS_URL}
    ports:
      - '3002:3000'
  files-service:
    build: ./services/files-service
    depends_on:
      - postgres
      - minio
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      S3_ENDPOINT: ${S3_ENDPOINT}
    ports:
      - '3003:3000'
  notifications-service:
    build: ./services/notifications-service
    depends_on:
      - nats
    environment:
      NATS_URL: ${NATS_URL}
    ports:
      - '3004:3000'
  ai-service:
    build: ./services/ai-service
    depends_on:
      - postgres
      - nats
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      NATS_URL: ${NATS_URL}
    ports:
      - '3005:3000'
  notes-service:
    build: ./services/notes-service
    depends_on:
      - postgres
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '3006:3000'
  analytics-service:
    build: ./services/analytics-service
    depends_on:
      - postgres
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '3007:3000'
  api-gateway:
    build: ./services/api-gateway
    depends_on:
      - auth-service
      - appointments-service
      - notes-service
      - analytics-service
    environment:
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - '4000:3000'
  frontend:
    build: ./frontend
    depends_on:
      - auth-service
    ports:
      - '5173:80'
