version: '3.8'
services:
  postgres:
    image: postgres:15
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
  nats:
    image: nats:2
    ports:
      - '4222:4222'
  maildev:
    image: maildev/maildev
    ports:
      - '1080:1080'
      - '1025:1025'
  minio:
    image: minio/minio
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000'
      - '9001:9001'
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    depends_on:
      - postgres
      - nats
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      NATS_URL: ${NATS_URL}
      S3_ENDPOINT: ${S3_ENDPOINT}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
    ports:
      - '3001:3000'
  appointments-service:
    build:
      context: .
      dockerfile: services/appointments-service/Dockerfile
    depends_on:
      - postgres
      - nats
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      NATS_URL: ${NATS_URL}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      SMTP_URL: ${SMTP_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
    ports:
      - '3002:3002'
  files-service:
    build:
      context: .
      dockerfile: services/files-service/Dockerfile
    depends_on:
      - postgres
      - minio
    environment:
      PORT: 3000
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      S3_ENDPOINT: ${S3_ENDPOINT}
    ports:
      - '3003:3000'
  notifications-service:
    build:
      context: .
      dockerfile: services/notifications-service/Dockerfile
    depends_on:
      - postgres
      - nats
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      NATS_URL: ${NATS_URL}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
    ports:
      - '3004:3004'
  ai-service:
    build:
      context: .
      dockerfile: services/ai-service/Dockerfile
    depends_on:
      - postgres
      - nats
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      NATS_URL: ${NATS_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - '3005:3000'
  notes-service:
    build:
      context: .
      dockerfile: services/notes-service/Dockerfile
    depends_on:
      - postgres
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '3006:3000'
  analytics-service:
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile
    depends_on:
      - postgres
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '3007:3007'
  settings-service:
    build:
      context: .
      dockerfile: services/settings-service/Dockerfile
    depends_on:
      - postgres
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - '3008:3008'
  billing-service:
    build:
      context: .
      dockerfile: services/billing-service/Dockerfile
    depends_on:
      - postgres
      - nats
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      NATS_URL: ${NATS_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: ${NODE_ENV}
      # Israeli Compliance
      VAT_RATE: 0.18
      CTC_THRESHOLD_NIS: 20000
      # Payment Processing
      TRANZILLA_API_KEY: ${TRANZILLA_API_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      # Notifications
      SMTP_HOST: maildev
      SMTP_PORT: 1025
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      FRONTEND_URL: ${FRONTEND_URL}
    ports:
      - '3009:3009'
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
  therapists-service:
    build:
      context: .
      dockerfile: services/therapists-service/Dockerfile
    depends_on:
      - postgres
      - nats
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: 3013
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      NATS_URL: ${NATS_URL}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - '3013:3013'
  client-relationships-service:
    build:
      context: .
      dockerfile: services/client-relationships-service/Dockerfile
    depends_on:
      - postgres
      - nats
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: 3014
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      NATS_URL: ${NATS_URL}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - '3014:3014'
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    depends_on:
      - auth-service
      - appointments-service
      - notes-service
      - analytics-service
      - settings-service
      - billing-service
      - therapists-service
      - client-relationships-service
      - nats
      - postgres
      - redis
    environment:
      PORT: ${PORT}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      SETTINGS_URL: ${SETTINGS_URL}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      NATS_URL: ${NATS_URL}
      NODE_ENV: ${NODE_ENV}
      CORS_ORIGINS: ${CORS_ORIGINS}
      # Redis configuration
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # HIPAA compliance and security
      PHI_ENCRYPTION_KEY: ${PHI_ENCRYPTION_KEY:-clinic_phi_encryption_key_production_2024_very_secure_default_key}
      # WebSocket configuration
      WS_CORS_ORIGIN: ${FRONTEND_ORIGIN}
      WS_TRANSPORTS: "websocket,polling"
      # Recording service integration
      S3_ENDPOINT: ${S3_ENDPOINT}
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
      # AI service configuration
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      # Microservice URLs for dashboard
      APPOINTMENTS_URL: http://appointments-service:3002
      NOTES_URL: http://notes-service:3000
      ANALYTICS_URL: http://analytics-service:3000
      AUTH_URL: http://auth-service:3000
      FILES_URL: http://files-service:3000
      NOTIFICATIONS_URL: http://notifications-service:3000
      BILLING_URL: http://billing-service:3009
      THERAPISTS_URL: http://therapists-service:3013
      CLIENT_RELATIONSHIPS_URL: http://client-relationships-service:3014
    ports:
      - '4000:3000'
  google-integration-service:
    build:
      context: .
      dockerfile: services/google-integration-service/Dockerfile.simple
    depends_on:
      - postgres
      - nats
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      NATS_URL: ${NATS_URL}
      NODE_ENV: ${NODE_ENV}
      # Google OAuth Configuration
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
    ports:
      - '3012:3009'
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - api-gateway
      - auth-service
    environment:
      # API endpoints
      REACT_APP_API_URL: http://localhost:4000
      REACT_APP_WS_URL: http://localhost:4000
      # Recording configuration
      REACT_APP_MAX_FILE_SIZE: 500
      REACT_APP_SUPPORTED_FORMATS: "mp4,mov,avi,mp3,wav,m4a,webm"
      # Feature flags
      REACT_APP_ENABLE_WEBSOCKETS: "true"
      REACT_APP_ENABLE_AI_SUMMARIES: "true"
      REACT_APP_ENABLE_RECORDINGS: "true"
    ports:
      - '5173:80'
  nginx:
    image: nginx:alpine
    depends_on:
      - frontend
      - api-gateway
    volumes:
      - ./frontend.nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - '80:80'
      - '443:443'
