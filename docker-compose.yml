version: '3.8'
services:
  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
  nats:
    image: nats:2
    ports:
      - "4222:4222"
  minio:
    image: minio/minio
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
