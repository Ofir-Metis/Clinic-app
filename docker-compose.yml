version: '3.8'
services:
  postgres:
    image: postgres:15
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
  nats:
    image: nats:2
    ports:
      - '4222:4222'
  maildev:
    image: maildev/maildev
    ports:
      - '1080:1080'
      - '1025:1025'
  minio:
    image: minio/minio
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000'
      - '9001:9001'
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    depends_on:
      - postgres
      - nats
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      NATS_URL: ${NATS_URL}
      S3_ENDPOINT: ${S3_ENDPOINT}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
    ports:
      - '3001:3000'
  appointments-service:
    build:
      context: .
      dockerfile: services/appointments-service/Dockerfile
    depends_on:
      - postgres
      - nats
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      NATS_URL: ${NATS_URL}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      SMTP_URL: ${SMTP_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
    ports:
      - '3002:3000'
  files-service:
    build:
      context: .
      dockerfile: services/files-service/Dockerfile
    depends_on:
      - postgres
      - minio
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      S3_ENDPOINT: ${S3_ENDPOINT}
    ports:
      - '3003:3000'
  notifications-service:
    build:
      context: .
      dockerfile: services/notifications-service/Dockerfile
    depends_on:
      - postgres
      - nats
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      NATS_URL: ${NATS_URL}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
    ports:
      - '3004:3000'
  ai-service:
    build:
      context: .
      dockerfile: services/ai-service/Dockerfile
    depends_on:
      - postgres
      - nats
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      NATS_URL: ${NATS_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - '3005:3000'
  notes-service:
    build:
      context: .
      dockerfile: services/notes-service/Dockerfile
    depends_on:
      - postgres
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '3006:3000'
  analytics-service:
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile
    depends_on:
      - postgres
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '3007:3000'
  settings-service:
    build:
      context: .
      dockerfile: services/settings-service/Dockerfile
    depends_on:
      - postgres
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - '3008:3000'
  billing-service:
    build:
      context: .
      dockerfile: services/billing-service/Dockerfile
    depends_on:
      - postgres
      - nats
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      NATS_URL: ${NATS_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: ${NODE_ENV}
      # Israeli Compliance
      VAT_RATE: 0.18
      CTC_THRESHOLD_NIS: 20000
      # Payment Processing
      TRANZILLA_API_KEY: ${TRANZILLA_API_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      # Notifications
      SMTP_HOST: maildev
      SMTP_PORT: 1025
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      FRONTEND_URL: ${FRONTEND_URL}
    ports:
      - '3009:3009'
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    depends_on:
      - auth-service
      - appointments-service
      - notes-service
      - analytics-service
      - settings-service
      - billing-service
      - nats
      - postgres
      - redis
    environment:
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      SETTINGS_URL: ${SETTINGS_URL}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      NATS_URL: ${NATS_URL}
      NODE_ENV: ${NODE_ENV}
      # WebSocket configuration
      WS_CORS_ORIGIN: ${FRONTEND_ORIGIN}
      WS_TRANSPORTS: "websocket,polling"
      # Recording service integration
      S3_ENDPOINT: ${S3_ENDPOINT}
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
      # AI service configuration
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - '4000:3000'
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - api-gateway
      - auth-service
    environment:
      # API endpoints
      REACT_APP_API_URL: http://api-gateway:3000
      REACT_APP_WS_URL: http://api-gateway:3000
      # Recording configuration
      REACT_APP_MAX_FILE_SIZE: 500
      REACT_APP_SUPPORTED_FORMATS: "mp4,mov,avi,mp3,wav,m4a,webm"
      # Feature flags
      REACT_APP_ENABLE_WEBSOCKETS: "true"
      REACT_APP_ENABLE_AI_SUMMARIES: "true"
      REACT_APP_ENABLE_RECORDINGS: "true"
    ports:
      - '5173:80'
