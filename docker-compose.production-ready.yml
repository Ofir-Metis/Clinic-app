      retries: 3
    networks:
      - clinic-network

  search-service:
    build:
      context: .
      dockerfile: services/search-service/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3010
      POSTGRES_HOST: postgres
      POSTGRES_DB: clinic
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      NATS_URL: nats://nats:4222
      ELASTICSEARCH_URL: http://elasticsearch:9200
    depends_on:
