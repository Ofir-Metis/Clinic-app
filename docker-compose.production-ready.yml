      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - clinic-network

  settings-service:
    build:
      context: .
      dockerfile: services/settings-service/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3008
      POSTGRES_HOST: postgres
      POSTGRES_DB: clinic
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3008/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - clinic-network

  billing-service:
    build:
      context: .
      dockerfile: services/billing-service/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3009
      POSTGRES_HOST: postgres
      POSTGRES_DB: clinic
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      NATS_URL: nats://nats:4222
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      TRANZILLA_TERMINAL: ${TRANZILLA_TERMINAL}
      TRANZILLA_USERNAME: ${TRANZILLA_USERNAME}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
