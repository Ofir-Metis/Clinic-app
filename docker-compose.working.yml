version: '3.8'

services:
  # Infrastructure Services
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: clinic
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 5

  nats:
    image: nats:2
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--config", "/etc/nats.conf"]
    volumes:
      - ./nats/nats.conf:/etc/nats.conf

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_BROWSER_REDIRECT_URL: http://localhost:9001
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  maildev:
    image: maildev/maildev
    ports:
      - "1080:1080"
      - "1025:1025"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:1080"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Working Application Services
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile.simple
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=clinic
      - JWT_SECRET=change-me-in-production
      - NATS_URL=nats://nats:4222
      - TWILIO_ACCOUNT_SID=AC00000000000000000000000000000000
      - TWILIO_AUTH_TOKEN=test-token
      - TWILIO_FROM=+1234567890
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

  notes-service:
    build:
      context: .
      dockerfile: services/notes-service/Dockerfile.simple
    ports:
      - "3006:3006"
    environment:
      - NODE_ENV=development
      - PORT=3006
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=clinic
      - NATS_URL=nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

  notifications-service:
    build:
      context: .
      dockerfile: services/notifications-service/Dockerfile.simple
    ports:
      - "3004:3004"
    environment:
      - NODE_ENV=development
      - PORT=3004
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=clinic
      - NATS_URL=nats://nats:4222
      - SMTP_HOST=maildev
      - SMTP_PORT=1025
      - TWILIO_ACCOUNT_SID=AC00000000000000000000000000000000
      - TWILIO_AUTH_TOKEN=test-token
      - TWILIO_FROM=+1234567890
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      maildev:
        condition: service_healthy

  files-service:
    build:
      context: .
      dockerfile: services/files-service/Dockerfile.simple
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=development
      - PORT=3003
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=clinic
      - JWT_SECRET=change-me-in-production
      - NATS_URL=nats://nats:4222
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=clinic-files
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      minio:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile.simple
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - PORT=4000
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=clinic
      - JWT_SECRET=change-me-in-production
      - NATS_URL=nats://nats:4222
      - REDIS_URL=redis://redis:6379
      - AUTH_SERVICE_URL=http://auth-service:3001
      - NOTES_SERVICE_URL=http://notes-service:3006
      - NOTIFICATIONS_SERVICE_URL=http://notifications-service:3004
      - FILES_SERVICE_URL=http://files-service:3003
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      notes-service:
        condition: service_healthy
      notifications-service:
        condition: service_healthy
      files-service:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data: