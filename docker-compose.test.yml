version: '3.8'

# Healthcare Platform - Test Environment for CI/CD
# Used by GitHub Actions for automated testing

services:
  # Test Database
  postgres-test:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: clinic_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: test_password_123
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - test-network

  # Test Redis
  redis-test:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 3
    networks:
      - test-network

  # Frontend - Test
  frontend-test:
    build:
      context: ./frontend
      dockerfile: Dockerfile.optimized
      args:
        VITE_API_URL: http://localhost:4002
        VITE_ENVIRONMENT: test
    ports:
      - "5175:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - test-network

networks:
  test-network:
    driver: bridge