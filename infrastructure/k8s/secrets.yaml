# Secret template - DO NOT commit actual secret values
# Use kubectl create secret or external secret management
apiVersion: v1
kind: Secret
metadata:
  name: clinic-app-secrets
  namespace: clinic-app
type: Opaque
stringData:
  # Database
  POSTGRES_PASSWORD: "REPLACE_WITH_ACTUAL_PASSWORD"
  
  # Authentication
  JWT_SECRET: "REPLACE_WITH_ACTUAL_JWT_SECRET"
  
  # External APIs
  OPENAI_API_KEY: "REPLACE_WITH_ACTUAL_OPENAI_KEY"
  TWILIO_ACCOUNT_SID: "REPLACE_WITH_ACTUAL_TWILIO_SID"
  TWILIO_AUTH_TOKEN: "REPLACE_WITH_ACTUAL_TWILIO_TOKEN"
  
  # Cloud Storage
  S3_ACCESS_KEY: "REPLACE_WITH_ACTUAL_S3_ACCESS_KEY"
  S3_SECRET_KEY: "REPLACE_WITH_ACTUAL_S3_SECRET_KEY"
  
  # Payment Processing
  STRIPE_SECRET_KEY: "REPLACE_WITH_ACTUAL_STRIPE_KEY"
  TRANZILLA_API_KEY: "REPLACE_WITH_ACTUAL_TRANZILLA_KEY"
  
  # Google Integration
  GOOGLE_CLIENT_ID: "REPLACE_WITH_ACTUAL_GOOGLE_CLIENT_ID"
  GOOGLE_CLIENT_SECRET: "REPLACE_WITH_ACTUAL_GOOGLE_CLIENT_SECRET"
  
  # Email
  EMAIL_USER: "REPLACE_WITH_ACTUAL_EMAIL_USER"
  EMAIL_PASS: "REPLACE_WITH_ACTUAL_EMAIL_PASS"
---
# External Secrets Operator configuration for AWS Secrets Manager
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: clinic-app
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        serviceAccountRef:
          name: clinic-app-secrets-sa
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: clinic-app-secrets-external
  namespace: clinic-app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: clinic-app-secrets
    creationPolicy: Owner
  data:
  - secretKey: POSTGRES_PASSWORD
    remoteRef:
      key: clinic-app-secrets-production
      property: POSTGRES_PASSWORD
  - secretKey: JWT_SECRET
    remoteRef:
      key: clinic-app-secrets-production
      property: JWT_SECRET
  - secretKey: OPENAI_API_KEY
    remoteRef:
      key: clinic-app-secrets-production
      property: OPENAI_API_KEY
  - secretKey: TWILIO_AUTH_TOKEN
    remoteRef:
      key: clinic-app-secrets-production
      property: TWILIO_AUTH_TOKEN
  - secretKey: S3_SECRET_KEY
    remoteRef:
      key: clinic-app-secrets-production
      property: S3_SECRET_KEY
  - secretKey: STRIPE_SECRET_KEY
    remoteRef:
      key: clinic-app-secrets-production
      property: STRIPE_SECRET_KEY