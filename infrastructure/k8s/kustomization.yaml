apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: clinic-app

resources:
- namespace.yaml
- configmap.yaml
- secrets.yaml
- infrastructure-services.yaml
- api-gateway-deployment.yaml
- auth-service-deployment.yaml

images:
- name: clinic-app/api-gateway
  newTag: latest
- name: clinic-app/auth-service
  newTag: latest

commonLabels:
  app.kubernetes.io/name: clinic-app
  app.kubernetes.io/version: "1.0.0"
  app.kubernetes.io/managed-by: kustomize

patches:
- target:
    kind: Deployment
    name: api-gateway
  patch: |-
    - op: replace
      path: /spec/replicas
      value: 3
- target:
    kind: Deployment
    name: auth-service
  patch: |-
    - op: replace
      path: /spec/replicas
      value: 2