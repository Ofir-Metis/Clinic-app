apiVersion: v2
name: clinic-app
description: A comprehensive clinic management platform with healthcare-grade security
type: application
version: 1.0.0
appVersion: "1.0.0"
home: https://clinic-platform.com
sources:
  - https://github.com/clinic-platform/clinic-app
maintainers:
  - name: Clinic Platform Team
    email: devops@clinic-platform.com
keywords:
  - clinic
  - healthcare
  - management
  - hipaa
  - microservices
annotations:
  category: Healthcare
  licenses: MIT
dependencies:
  - name: postgresql
    version: "12.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: "17.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: nats
    version: "0.19.x"
    repository: https://nats-io.github.io/k8s/helm/charts/
    condition: nats.enabled
  - name: minio
    version: "12.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: minio.enabled
  - name: prometheus
    version: "23.x.x"
    repository: https://prometheus-community.github.io/helm-charts
    condition: monitoring.prometheus.enabled
  - name: grafana
    version: "6.x.x"
    repository: https://grafana.github.io/helm-charts
    condition: monitoring.grafana.enabled