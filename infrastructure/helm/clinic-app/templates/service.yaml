{{/* API Gateway Service */}}
{{- if .Values.apiGateway.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "clinic-app.serviceName" (dict "Values" .Values "serviceName" "api-gateway") }}
  labels:
    {{- include "clinic-app.serviceLabels" (dict "Values" .Values "Chart" .Chart "Release" .Release "component" "api-gateway") | nindent 4 }}
  annotations:
    {{- include "clinic-app.annotations" . | nindent 4 }}
    {{- if .Values.monitoring.serviceMonitor.enabled }}
    prometheus.io/scrape: "true"
    prometheus.io/port: "{{ .Values.apiGateway.service.port }}"
    prometheus.io/path: "/metrics"
    {{- end }}
spec:
  type: {{ .Values.apiGateway.service.type }}
  ports:
    - port: {{ .Values.apiGateway.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "clinic-app.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api-gateway
{{- end }}

{{/* Microservices Services */}}
{{- range $serviceName, $serviceConfig := .Values.services }}
{{- if $serviceConfig.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "clinic-app.serviceName" (dict "Values" $.Values "serviceName" $serviceConfig.name) }}
  labels:
    {{- include "clinic-app.serviceLabels" (dict "Values" $.Values "Chart" $.Chart "Release" $.Release "component" $serviceConfig.name) | nindent 4 }}
  annotations:
    {{- include "clinic-app.annotations" $ | nindent 4 }}
    {{- if $.Values.monitoring.serviceMonitor.enabled }}
    prometheus.io/scrape: "true"
    prometheus.io/port: "{{ $serviceConfig.service.port }}"
    prometheus.io/path: "/metrics"
    {{- end }}
spec:
  type: ClusterIP
  ports:
    - port: {{ $serviceConfig.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "clinic-app.selectorLabels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $serviceConfig.name }}
{{- end }}
{{- end }}

{{/* Frontend Service */}}
{{- if .Values.frontend.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "clinic-app.serviceName" (dict "Values" .Values "serviceName" "frontend") }}
  labels:
    {{- include "clinic-app.serviceLabels" (dict "Values" .Values "Chart" .Chart "Release" .Release "component" "frontend") | nindent 4 }}
  annotations:
    {{- include "clinic-app.annotations" . | nindent 4 }}
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "clinic-app.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
{{- end }}