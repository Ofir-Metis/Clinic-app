{{- if .Values.serviceAccount.create -}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "clinic-app.serviceAccountName" . }}
  labels:
    {{- include "clinic-app.labels" . | nindent 4 }}
  annotations:
    {{- include "clinic-app.annotations" . | nindent 4 }}
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
automountServiceAccountToken: true
{{- end }}