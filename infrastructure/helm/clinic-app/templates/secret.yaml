{{- if .Values.secrets.manual.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clinic-app.fullname" . }}-app-secrets
  labels:
    {{- include "clinic-app.labels" . | nindent 4 }}
  annotations:
    {{- include "clinic-app.annotations" . | nindent 4 }}
type: Opaque
data:
  # Application secrets (base64 encoded)
  {{- if .Values.secrets.manual.secrets.application.JWT_SECRET }}
  JWT_SECRET: {{ .Values.secrets.manual.secrets.application.JWT_SECRET | b64enc }}
  {{- else }}
  JWT_SECRET: {{ randAlphaNum 32 | b64enc }}
  {{- end }}
  
  {{- if .Values.secrets.manual.secrets.application.SESSION_SECRET_KEY }}
  SESSION_SECRET_KEY: {{ .Values.secrets.manual.secrets.application.SESSION_SECRET_KEY | b64enc }}
  {{- else }}
  SESSION_SECRET_KEY: {{ randAlphaNum 32 | b64enc }}
  {{- end }}
  
  {{- if .Values.secrets.manual.secrets.application.COOKIE_SECRET }}
  COOKIE_SECRET: {{ .Values.secrets.manual.secrets.application.COOKIE_SECRET | b64enc }}
  {{- else }}
  COOKIE_SECRET: {{ randAlphaNum 32 | b64enc }}
  {{- end }}
  
  {{- if .Values.secrets.manual.secrets.application.OPENAI_API_KEY }}
  OPENAI_API_KEY: {{ .Values.secrets.manual.secrets.application.OPENAI_API_KEY | b64enc }}
  {{- end }}

{{- end }}

{{- if .Values.secrets.externalSecrets.enabled }}
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: {{ include "clinic-app.fullname" . }}-secret-store
  labels:
    {{- include "clinic-app.labels" . | nindent 4 }}
spec:
  provider:
    {{- if eq .Values.secrets.externalSecrets.secretStore.provider "aws" }}
    aws:
      service: SecretsManager
      region: {{ .Values.secrets.externalSecrets.secretStore.region }}
      auth:
        jwt:
          serviceAccountRef:
            name: {{ include "clinic-app.serviceAccountName" . }}
    {{- else if eq .Values.secrets.externalSecrets.secretStore.provider "azure" }}
    azurekv:
      authType: ManagedIdentity
      vaultUrl: {{ .Values.secrets.externalSecrets.secretStore.vaultUrl }}
    {{- else if eq .Values.secrets.externalSecrets.secretStore.provider "gcp" }}
    gcpsm:
      projectId: {{ .Values.secrets.externalSecrets.secretStore.projectId }}
      auth:
        workloadIdentity:
          clusterLocation: {{ .Values.secrets.externalSecrets.secretStore.clusterLocation }}
          clusterName: {{ .Values.secrets.externalSecrets.secretStore.clusterName }}
          serviceAccountRef:
            name: {{ include "clinic-app.serviceAccountName" . }}
    {{- end }}

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "clinic-app.fullname" . }}-external-secrets
  labels:
    {{- include "clinic-app.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ include "clinic-app.fullname" . }}-secret-store
    kind: SecretStore
  target:
    name: {{ include "clinic-app.fullname" . }}-app-secrets
    creationPolicy: Owner
  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: clinic-app/jwt-secret
    - secretKey: SESSION_SECRET_KEY
      remoteRef:
        key: clinic-app/session-secret
    - secretKey: COOKIE_SECRET
      remoteRef:
        key: clinic-app/cookie-secret
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: clinic-app/openai-api-key
    - secretKey: DATABASE_PASSWORD
      remoteRef:
        key: clinic-app/database-password
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: clinic-app/redis-password
    - secretKey: NATS_PASSWORD
      remoteRef:
        key: clinic-app/nats-password
    - secretKey: MINIO_ROOT_PASSWORD
      remoteRef:
        key: clinic-app/minio-password

{{- end }}