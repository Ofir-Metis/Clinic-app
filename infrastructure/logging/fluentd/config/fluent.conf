# Fluentd configuration for Clinic App centralized logging

# Input sources
<source>
  @type forward
  port 24224
  bind 0.0.0.0
  tag clinic.app
</source>

<source>
  @type http
  port 9880
  bind 0.0.0.0
  body_size_limit 32m
  keepalive_timeout 10s
  tag clinic.http
</source>

<source>
  @type tail
  path /var/log/clinic-app/*.log
  pos_file /var/log/fluentd/clinic-app.log.pos
  tag clinic.app.file
  format json
  time_key @timestamp
  time_format %Y-%m-%dT%H:%M:%S.%L%z
  refresh_interval 5s
  read_from_head true
</source>

<source>
  @type tail
  path /var/log/clinic-app/error-*.log
  pos_file /var/log/fluentd/clinic-error.log.pos
  tag clinic.app.error
  format json
  time_key @timestamp
  time_format %Y-%m-%dT%H:%M:%S.%L%z
  refresh_interval 5s
  read_from_head true
</source>

<source>
  @type tail
  path /var/log/clinic-app/healthcare-audit-*.log
  pos_file /var/log/fluentd/clinic-audit.log.pos
  tag clinic.app.audit
  format json
  time_key @timestamp
  time_format %Y-%m-%dT%H:%M:%S.%L%z
  refresh_interval 5s
  read_from_head true
</source>

# Docker container logs
<source>
  @type tail
  path /var/lib/docker/containers/*/*-json.log
  pos_file /var/log/fluentd/docker.log.pos
  tag docker.*
  format json
  time_key time
  time_format %Y-%m-%dT%H:%M:%S.%NZ
  refresh_interval 5s
  read_from_head true
</source>

# Filters for data processing and enrichment

# Parse Docker logs
<filter docker.**>
  @type parser
  key_name log
  reserve_data true
  <parse>
    @type json
  </parse>
</filter>

# Add Docker metadata
<filter docker.**>
  @type docker_metadata
  docker_url unix:///var/run/docker.sock
  container_id_regex (?<container_id>[a-z0-9]{64})
  container_name_regex ^/?(?<container_name>[a-zA-Z0-9][a-zA-Z0-9_.-]+)$
</filter>

# Healthcare data classification and compliance tagging
<filter clinic.app.**>
  @type record_transformer
  enable_ruby true
  <record>
    # Add compliance metadata
    compliance_processed true
    processed_at ${Time.now.utc.iso8601}
    log_source fluentd
    
    # Classify healthcare data
    data_classification ${record['dataType'] == 'phi' ? 'phi' : record['dataType'] == 'pii' ? 'pii' : 'general'}
    hipaa_relevant ${record['dataType'] == 'phi' || record['auditRequired'] ? true : false}
    
    # Add retention metadata
    retention_period ${record['dataType'] == 'phi' || record['auditRequired'] ? '7-years' : '30-days'}
    
    # Security classification
    security_level ${record['dataType'] == 'phi' ? 'restricted' : record['dataType'] == 'pii' ? 'confidential' : 'internal'}
  </record>
</filter>

# Sensitive data detection and masking
<filter clinic.app.**>
  @type grep
  <regexp>
    key message
    pattern /password|ssn|social.*security|credit.*card|card.*number/i
  </regexp>
  <record>
    sensitive_data_detected true
    data_masked true
  </record>
</filter>

<filter clinic.app.**>
  @type record_transformer
  enable_ruby true
  <record>
    # Mask sensitive data patterns
    message ${record['message'].to_s.gsub(/\b\d{3}-\d{2}-\d{4}\b/, 'XXX-XX-XXXX').gsub(/\b\d{4}[- ]\d{4}[- ]\d{4}[- ]\d{4}\b/, 'XXXX-XXXX-XXXX-XXXX')}
  </record>
</filter>

# Performance metrics extraction
<filter clinic.app.**>
  @type record_transformer
  enable_ruby true
  <record>
    # Extract performance metrics
    is_slow_request ${record['duration'] && record['duration'].to_i > 1000 ? true : false}
    performance_tier ${
      duration = record['duration'].to_i
      case
      when duration < 100 then 'fast'
      when duration < 500 then 'normal'
      when duration < 1000 then 'slow'  
      else 'critical'
      end
    }
  </record>
</filter>

# Error categorization
<filter clinic.app.error>
  @type record_transformer
  enable_ruby true
  <record>
    error_category ${
      case record['statusCode'].to_i
      when 400..499 then 'client_error'
      when 500..599 then 'server_error'
      else 'unknown_error'
      end
    }
    
    alert_level ${
      case record['statusCode'].to_i
      when 401, 403 then 'security'
      when 500..503 then 'critical'
      when 504..599 then 'warning'
      else 'info'
      end
    }
  </record>
</filter>

# Audit log enrichment
<filter clinic.app.audit>
  @type record_transformer
  enable_ruby true
  <record>
    audit_log true
    compliance_log true
    long_term_retention true
    hipaa_audit_log true
    audit_processed_at ${Time.now.utc.iso8601}
  </record>
</filter>

# Rate limiting and deduplication
<filter clinic.app.**>
  @type dedupe
  key message,level,service,userId
  cache_size 1000
  cache_ttl 60
</filter>

# Output configurations

# Main application logs to Elasticsearch
<match clinic.app.**>
  @type elasticsearch
  host "#{ENV['ELASTICSEARCH_HOST'] || 'elasticsearch'}"
  port "#{ENV['ELASTICSEARCH_PORT'] || '9200'}"
  index_name clinic-logs-%Y.%m.%d
  type_name _doc
  
  # Template configuration
  template_name clinic-logs-template
  template_overwrite true
  template_file /fluentd/etc/clinic-logs-template.json
  
  # Performance settings
  flush_interval 5s
  chunk_limit_size 32MB
  queue_limit_length 512
  retry_limit 5
  retry_wait 2s
  max_retry_wait 30s
  
  # Buffer configuration
  <buffer time>
    @type file
    path /var/log/fluentd/clinic-logs.*.buffer
    timekey 1h
    timekey_wait 5m
    flush_mode interval
    flush_interval 30s
    chunk_limit_size 64MB
    queue_limit_length 256
    retry_type exponential_backoff
    retry_wait 2s
    retry_max_interval 30s
    retry_forever false
    retry_max_times 5
    overflow_action block
  </buffer>
</match>

# Healthcare audit logs to separate index with long retention
<match clinic.app.audit>
  @type elasticsearch
  host "#{ENV['ELASTICSEARCH_HOST'] || 'elasticsearch'}"
  port "#{ENV['ELASTICSEARCH_PORT'] || '9200'}"
  index_name clinic-audit-logs-%Y.%m.%d
  type_name _doc
  
  template_name clinic-audit-logs-template
  template_overwrite true
  template_file /fluentd/etc/clinic-audit-logs-template.json
  
  <buffer time>
    @type file
    path /var/log/fluentd/clinic-audit.*.buffer
    timekey 1d
    timekey_wait 10m
    flush_mode interval
    flush_interval 60s
    chunk_limit_size 32MB
    queue_limit_length 128
  </buffer>
</match>

# Error logs to separate index
<match clinic.app.error>
  @type elasticsearch
  host "#{ENV['ELASTICSEARCH_HOST'] || 'elasticsearch'}"
  port "#{ENV['ELASTICSEARCH_PORT'] || '9200'}"
  index_name clinic-error-logs-%Y.%m.%d
  type_name _doc
  
  template_name clinic-error-logs-template
  template_overwrite true
  template_file /fluentd/etc/clinic-error-logs-template.json
  
  <buffer time>
    @type file
    path /var/log/fluentd/clinic-errors.*.buffer
    timekey 1h
    timekey_wait 5m
    flush_mode interval
    flush_interval 10s
    chunk_limit_size 16MB
    queue_limit_length 512
  </buffer>
</match>

# Docker logs
<match docker.**>
  @type elasticsearch
  host "#{ENV['ELASTICSEARCH_HOST'] || 'elasticsearch'}"
  port "#{ENV['ELASTICSEARCH_PORT'] || '9200'}"
  index_name docker-logs-%Y.%m.%d
  type_name _doc
  
  <buffer time>
    @type file
    path /var/log/fluentd/docker.*.buffer
    timekey 1h
    timekey_wait 5m
    flush_mode interval
    flush_interval 30s
  </buffer>
</match>

# File backup for critical logs
<match clinic.app.audit clinic.app.error>
  @type copy
  
  <store>
    @type file
    path /var/log/fluentd/backup/audit-%Y%m%d
    time_slice_format %Y%m%d
    time_slice_wait 10m
    time_format %Y-%m-%dT%H:%M:%S.%NZ
    compress gzip
    format json
    include_time_key true
    time_key @timestamp
  </store>
  
  <store>
    @type forward
    heartbeat_type tcp
    
    <server>
      name backup-fluentd
      host backup-fluentd-server
      port 24224
    </server>
    
    <buffer>
      @type file
      path /var/log/fluentd/backup.*.buffer
      flush_mode interval
      flush_interval 60s
    </buffer>
  </store>
</match>

# Monitoring and metrics
<source>
  @type monitor_agent
  bind 0.0.0.0
  port 24220
</source>

# Health check endpoint
<source>
  @type http
  port 9881
  bind 0.0.0.0
  tag fluentd.health
</source>

<match fluentd.health>
  @type null
</match>

# System metrics
<source>
  @type systemd
  tag systemd
  path /var/log/journal
  matches [{ "_SYSTEMD_UNIT": "clinic-app.service" }]
  read_from_head true
  strip_underscores true
</source>

<match systemd>
  @type elasticsearch
  host "#{ENV['ELASTICSEARCH_HOST'] || 'elasticsearch'}"
  port "#{ENV['ELASTICSEARCH_PORT'] || '9200'}"
  index_name system-logs-%Y.%m.%d
  type_name _doc
</match>

# Catch-all for unmatched logs
<match **>
  @type elasticsearch
  host "#{ENV['ELASTICSEARCH_HOST'] || 'elasticsearch'}"
  port "#{ENV['ELASTICSEARCH_PORT'] || '9200'}"
  index_name misc-logs-%Y.%m.%d
  type_name _doc
  
  <buffer time>
    @type file
    path /var/log/fluentd/misc.*.buffer
    timekey 1h
    timekey_wait 5m
    flush_mode interval
    flush_interval 60s
  </buffer>
</match>