version: '3.8'

services:
  # Primary load balancer
  nginx-lb-primary:
    image: nginx:1.25-alpine
    container_name: clinic-lb-primary
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080" # Health check port
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/ssl:ro
      - ./logs:/var/log/nginx
      - ./html:/usr/share/nginx/html:ro
    depends_on:
      - api-gateway-1
      - api-gateway-2
      - frontend-1
      - frontend-2
    networks:
      - clinic-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
        
  # Secondary load balancer (backup)
  nginx-lb-secondary:
    image: nginx:1.25-alpine
    container_name: clinic-lb-secondary
    ports:
      - "8081:80"
      - "8443:443"
      - "8082:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/ssl:ro
      - ./logs-secondary:/var/log/nginx
      - ./html:/usr/share/nginx/html:ro
    depends_on:
      - api-gateway-1
      - api-gateway-2
      - frontend-1
      - frontend-2
    networks:
      - clinic-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # API Gateway instances
  api-gateway-1:
    image: clinic/api-gateway:latest
    container_name: clinic-api-gateway-1
    environment:
      - NODE_ENV=production
      - PORT=4000
      - INSTANCE_ID=gateway-1
      - REDIS_URL=redis://redis-cluster:6379
      - DATABASE_URL=postgresql://postgres:password@postgres-primary:5432/clinic
    depends_on:
      - postgres-primary
      - redis-cluster
    networks:
      - clinic-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  api-gateway-2:
    image: clinic/api-gateway:latest
    container_name: clinic-api-gateway-2
    environment:
      - NODE_ENV=production
      - PORT=4000
      - INSTANCE_ID=gateway-2
      - REDIS_URL=redis://redis-cluster:6379
      - DATABASE_URL=postgresql://postgres:password@postgres-primary:5432/clinic
    depends_on:
      - postgres-primary
      - redis-cluster
    networks:
      - clinic-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  api-gateway-3:
    image: clinic/api-gateway:latest
    container_name: clinic-api-gateway-3
    environment:
      - NODE_ENV=production
      - PORT=4000
      - INSTANCE_ID=gateway-3
      - REDIS_URL=redis://redis-cluster:6379
      - DATABASE_URL=postgresql://postgres:password@postgres-replica:5432/clinic
    depends_on:
      - postgres-replica
      - redis-cluster
    networks:
      - clinic-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    profiles:
      - backup

  # Frontend instances
  frontend-1:
    image: clinic/frontend:latest
    container_name: clinic-frontend-1
    environment:
      - NODE_ENV=production
      - REACT_APP_API_URL=http://api-gateway-1:4000
      - REACT_APP_INSTANCE_ID=frontend-1
    networks:
      - clinic-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  frontend-2:
    image: clinic/frontend:latest
    container_name: clinic-frontend-2
    environment:
      - NODE_ENV=production
      - REACT_APP_API_URL=http://api-gateway-2:4000
      - REACT_APP_INSTANCE_ID=frontend-2
    networks:
      - clinic-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  frontend-3:
    image: clinic/frontend:latest
    container_name: clinic-frontend-3
    environment:
      - NODE_ENV=production
      - REACT_APP_API_URL=http://api-gateway-3:4000
      - REACT_APP_INSTANCE_ID=frontend-3
    networks:
      - clinic-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    profiles:
      - backup

  # Database cluster
  postgres-primary:
    image: postgres:15-alpine
    container_name: clinic-postgres-primary
    environment:
      - POSTGRES_DB=clinic
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_REPLICATION_MODE=master
      - POSTGRES_REPLICATION_USER=replicator
      - POSTGRES_REPLICATION_PASSWORD=replicator_password
    volumes:
      - postgres-primary-data:/var/lib/postgresql/data
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf
    networks:
      - clinic-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '1.0'

  postgres-replica:
    image: postgres:15-alpine
    container_name: clinic-postgres-replica
    environment:
      - POSTGRES_REPLICATION_MODE=slave
      - POSTGRES_REPLICATION_USER=replicator
      - POSTGRES_REPLICATION_PASSWORD=replicator_password
      - POSTGRES_MASTER_HOST=postgres-primary
      - POSTGRES_MASTER_PORT=5432
    depends_on:
      - postgres-primary
    networks:
      - clinic-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '1.0'

  # Redis cluster
  redis-cluster:
    image: redis:7-alpine
    container_name: clinic-redis-cluster
    command: redis-server --appendonly yes --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000
    volumes:
      - redis-data:/data
    networks:
      - clinic-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  # Health checker service
  health-checker:
    image: alpine/curl:latest
    container_name: clinic-health-checker
    command: >
      sh -c "
        while true; do
          echo 'Running health checks...'
          curl -f http://nginx-lb-primary:8080/health || echo 'Primary LB unhealthy'
          curl -f http://nginx-lb-secondary:8080/health || echo 'Secondary LB unhealthy'
          curl -f http://api-gateway-1:4000/health || echo 'API Gateway 1 unhealthy'
          curl -f http://api-gateway-2:4000/health || echo 'API Gateway 2 unhealthy'
          sleep 60
        done
      "
    depends_on:
      - nginx-lb-primary
      - nginx-lb-secondary
    networks:
      - clinic-network
    restart: unless-stopped

networks:
  clinic-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres-primary-data:
    driver: local
  redis-data:
    driver: local