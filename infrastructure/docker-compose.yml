version: '3.8'
services:
  postgres:
    image: postgres:15
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
  migrate:
    image: node:18
    depends_on:
      - postgres
    working_dir: /app
    volumes:
      - ../:/app
    command: sh -c "yarn install && ./scripts/migrate.sh"
volumes:
  postgres-data:
