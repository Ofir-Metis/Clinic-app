apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clinic-ingress
  namespace: clinic-production
  labels:
    app: clinic-platform
    tier: ingress
    environment: production
  annotations:
    # NGINX Ingress Controller configurations
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "500m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/client-body-timeout: "300"
    
    # Healthcare-specific security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:;" always;
    
    # Rate limiting for healthcare APIs
    nginx.ingress.kubernetes.io/rate-limit-rps: "100"
    nginx.ingress.kubernetes.io/rate-limit-burst: "200"
    nginx.ingress.kubernetes.io/rate-limit-connections: "50"
    
    # Session affinity for healthcare workflows
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/affinity-mode: "persistent"
    nginx.ingress.kubernetes.io/session-cookie-name: "clinic-session"
    nginx.ingress.kubernetes.io/session-cookie-max-age: "86400"
    
    # Custom error pages
    nginx.ingress.kubernetes.io/custom-http-errors: "404,503,500,502"
    nginx.ingress.kubernetes.io/default-backend: "clinic-default-backend"
    
    # Enable CORS for healthcare APIs
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://clinic.health.com,https://admin.clinic.health.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization,X-Patient-ID,X-Session-ID"
    
    # SSL certificate configuration
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    cert-manager.io/acme-challenge-type: "http01"
spec:
  tls:
  - hosts:
    - clinic.health.com
    - admin.clinic.health.com
    - api.clinic.health.com
    secretName: clinic-tls-secret
  rules:
  # Main frontend application
  - host: clinic.health.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
      # Health check endpoint
      - path: /health
        pathType: Exact
        backend:
          service:
            name: frontend-service
            port:
              number: 80
              
  # Admin dashboard
  - host: admin.clinic.health.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
      # Restrict admin access with IP whitelist
      - path: /admin
        pathType: Prefix
        backend:
          service:
            name: api-gateway-service
            port:
              number: 4000
              
  # API Gateway
  - host: api.clinic.health.com
    http:
      paths:
      # Authentication endpoints (special handling)
      - path: /api/auth
        pathType: Prefix
        backend:
          service:
            name: auth-service
            port:
              number: 3001
      # File upload endpoints with extended timeouts
      - path: /api/files
        pathType: Prefix
        backend:
          service:
            name: files-service
            port:
              number: 3003
      # AI service endpoints
      - path: /api/ai
        pathType: Prefix
        backend:
          service:
            name: ai-service
            port:
              number: 3005
      # Notes service
      - path: /api/notes
        pathType: Prefix
        backend:
          service:
            name: notes-service
            port:
              number: 3006
      # Appointments service
      - path: /api/appointments
        pathType: Prefix
        backend:
          service:
            name: appointments-service
            port:
              number: 3002
      # Notifications service
      - path: /api/notifications
        pathType: Prefix
        backend:
          service:
            name: notifications-service
            port:
              number: 3004
      # Analytics service
      - path: /api/analytics
        pathType: Prefix
        backend:
          service:
            name: analytics-service
            port:
              number: 3007
      # Settings service
      - path: /api/settings
        pathType: Prefix
        backend:
          service:
            name: settings-service
            port:
              number: 3008
      # Billing service
      - path: /api/billing
        pathType: Prefix
        backend:
          service:
            name: billing-service
            port:
              number: 3009
      # Default API Gateway for other routes
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: api-gateway-service
            port:
              number: 4000
      # WebSocket connections
      - path: /socket.io
        pathType: Prefix
        backend:
          service:
            name: api-gateway-service
            port:
              number: 4000

---
# Default backend for custom error pages
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clinic-default-backend
  namespace: clinic-production
  labels:
    app: default-backend
    tier: infrastructure
spec:
  replicas: 2
  selector:
    matchLabels:
      app: default-backend
  template:
    metadata:
      labels:
        app: default-backend
    spec:
      containers:
      - name: default-backend
        image: gcr.io/google_containers/defaultbackend:1.4
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 30
          timeoutSeconds: 5
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
          requests:
            cpu: 50m
            memory: 64Mi

---
apiVersion: v1
kind: Service
metadata:
  name: clinic-default-backend
  namespace: clinic-production
  labels:
    app: default-backend
spec:
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: default-backend

---
# Network Policy for Ingress traffic control
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ingress-network-policy
  namespace: clinic-production
spec:
  podSelector:
    matchLabels:
      tier: frontend
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 80
    - protocol: TCP
      port: 443
  egress:
  - to:
    - podSelector:
        matchLabels:
          tier: backend
    ports:
    - protocol: TCP
      port: 4000
    - protocol: TCP
      port: 3001
    - protocol: TCP
      port: 3002
    - protocol: TCP
      port: 3003
    - protocol: TCP
      port: 3004
    - protocol: TCP
      port: 3005
    - protocol: TCP
      port: 3006
    - protocol: TCP
      port: 3007
    - protocol: TCP
      port: 3008
    - protocol: TCP
      port: 3009