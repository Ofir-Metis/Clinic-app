    environment:
      NODE_ENV: production
      PORT: 3014
      POSTGRES_HOST: postgres
      POSTGRES_DB: clinic
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      NATS_URL: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "3014:3014"
    depends_on:
      - postgres
      - nats
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3014/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - clinic-network

  progress-service:
    build:
      context: .
      dockerfile: services/progress-service/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3015
      POSTGRES_HOST: postgres
      POSTGRES_DB: clinic
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      NATS_URL: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "3015:3015"
    depends_on:
      - postgres
      - nats
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3015/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
