version: '3.8'

# Monitoring & Admin Platform Services
# Monitoring, logging, and administrative tools
# Usage: docker-compose -f docker-compose.core.yml -f docker-compose.monitoring.yml up -d

services:
  # Load Balancer (Production)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/load-balancer/nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - api-gateway
    networks:
      - clinic-network
      - default
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  # Monitoring Stack
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - clinic-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_SERVER_DOMAIN: ${GRAFANA_DOMAIN:-localhost}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - clinic-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.25'

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - clinic-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.25'

  promtail:
    image: grafana/promtail:latest
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - clinic-network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'

  # Log Aggregation
  fluentd:
    image: fluent/fluentd:edge-debian
    ports:
      - "24224:24224"
    volumes:
      - ./monitoring/fluentd:/fluentd/etc
      - fluentd_data:/var/log/fluentd
    environment:
      FLUENTD_CONF: fluent.conf
    networks:
      - clinic-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.1'

  # Application Performance Monitoring
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "14268:14268"
    environment:
      COLLECTOR_OTLP_ENABLED: true
    volumes:
      - jaeger_data:/tmp
    networks:
      - clinic-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.25'

  # Security Monitoring
  falco:
    image: falcosecurity/falco:latest
    privileged: true
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - /dev:/host/dev
      - /proc:/host/proc:ro
      - /boot:/host/boot:ro
      - /lib/modules:/host/lib/modules:ro
      - /usr:/host/usr:ro
      - /etc:/host/etc:ro
      - ./monitoring/falco/falco.yaml:/etc/falco/falco.yaml
    networks:
      - clinic-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.1'

  # Health Check Dashboard
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    ports:
      - "3301:3001"
    volumes:
      - uptime_data:/app/data
    networks:
      - clinic-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.1'

  # Database Monitoring
  pgadmin:
    image: dpage/pgadmin4:latest
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@clinic.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - clinic-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.1'

  # Redis Monitoring
  redis-commander:
    image: rediscommander/redis-commander:latest
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: "local:redis:6379"
      HTTP_USER: ${REDIS_COMMANDER_USER:-admin}
      HTTP_PASSWORD: ${REDIS_COMMANDER_PASSWORD:-admin}
    networks:
      - clinic-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8081/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.05'

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  fluentd_data:
  jaeger_data:
  uptime_data:
  pgadmin_data:

networks:
  clinic-network:
    driver: bridge