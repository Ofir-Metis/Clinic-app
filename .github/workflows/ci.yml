name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'yarn'
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn lint

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace: [frontend, auth-service, appointments-service, files-service, notifications-service, ai-service]
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'yarn'
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn workspace ${{ matrix.workspace }} test

  docker:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v3
      - run: echo "Docker build & publish"
