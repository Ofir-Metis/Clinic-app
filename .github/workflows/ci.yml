name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'yarn'
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn lint

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace: [frontend, auth-service, appointments-service, files-service, notifications-service, ai-service, api-gateway, analytics-service, notes-service, therapists-service, settings-service]
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'yarn'
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn workspace ${{ matrix.workspace }} test

  docker:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v3
      - run: |
          echo "Build and push docker images"
          for ws in auth-service appointments-service files-service notifications-service ai-service api-gateway analytics-service notes-service therapists-service settings-service; do
            docker build -t myrepo/$ws:latest services/$ws
          done

  terraform:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: docker
    steps:
      - uses: actions/checkout@v3
      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.6
      - run: terraform -chdir=infrastructure/terraform init
      - run: terraform -chdir=infrastructure/terraform plan
