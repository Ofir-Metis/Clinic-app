name: Playwright E2E Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [ chromium, firefox, webkit ]
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'yarn'

    - name: Install dependencies
      run: |
        yarn install --frozen-lockfile
        yarn workspace @clinic/common build

    - name: Install Playwright browsers
      run: npx playwright install --with-deps ${{ matrix.browser }}

    - name: Setup test environment
      run: |
        cp .env.example .env
        echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/clinic_test" >> .env
        echo "NATS_URL=nats://localhost:4222" >> .env
        echo "REDIS_URL=redis://localhost:6379" >> .env

    - name: Start test services
      run: |
        docker compose -f docker-compose.test.yml up -d postgres nats redis minio
        sleep 10

    - name: Run database migrations
      run: |
        yarn workspace auth-service migration:run
        yarn workspace appointments-service migration:run

    - name: Start application services
      run: |
        # Start backend services in background
        yarn workspace api-gateway start &
        yarn workspace auth-service start &
        yarn workspace appointments-service start &
        yarn workspace notifications-service start &
        
        # Wait for services to start
        sleep 30
        
        # Start frontend
        cd frontend && yarn build && yarn preview &
        sleep 10

    - name: Wait for services
      run: |
        npx wait-on http://localhost:4000/health
        npx wait-on http://localhost:5175

    - name: Run Playwright tests
      run: npx playwright test --project=${{ matrix.browser }}
      env:
        PLAYWRIGHT_BASE_URL: http://localhost:5175

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report-${{ matrix.browser }}
        path: playwright-report/
        retention-days: 30

    - name: Upload test artifacts
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: playwright-screenshots-${{ matrix.browser }}
        path: test-results/
        retention-days: 7

    - name: Stop services
      if: always()
      run: |
        docker compose -f docker-compose.test.yml down
        pkill -f "yarn workspace" || true

  # Consolidate reports from all browsers
  merge-reports:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'yarn'

    - name: Install dependencies
      run: yarn install --frozen-lockfile

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: all-reports

    - name: Merge HTML reports
      run: |
        npx playwright merge-reports all-reports/playwright-report-*

    - name: Upload merged report
      uses: actions/upload-artifact@v4
      with:
        name: merged-playwright-report
        path: playwright-report/
        retention-days: 30

    - name: Deploy to GitHub Pages
      if: github.ref == 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./playwright-report
        destination_dir: test-reports/${{ github.run_number }}

  # Performance testing
  performance:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || contains(github.event.head_commit.message, '[perf]')
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'yarn'

    - name: Install dependencies
      run: |
        yarn install --frozen-lockfile
        yarn workspace @clinic/common build

    - name: Install Playwright
      run: npx playwright install chromium

    - name: Setup and start services
      run: |
        cp .env.example .env
        docker compose -f docker-compose.test.yml up -d
        sleep 30
        yarn workspace api-gateway start &
        cd frontend && yarn build && yarn preview &
        sleep 20

    - name: Run performance tests
      run: npx playwright test --grep "@performance" --project=chromium

    - name: Upload performance results
      uses: actions/upload-artifact@v4
      with:
        name: performance-results
        path: performance-results/

  # Accessibility testing
  accessibility:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'yarn'

    - name: Install dependencies
      run: |
        yarn install --frozen-lockfile
        yarn workspace @clinic/common build

    - name: Install Playwright
      run: npx playwright install chromium

    - name: Setup and start services
      run: |
        cp .env.example .env
        docker compose -f docker-compose.test.yml up -d
        sleep 30
        yarn workspace api-gateway start &
        cd frontend && yarn build && yarn preview &
        sleep 20

    - name: Run accessibility tests
      run: npx playwright test --grep "@accessibility" --project=chromium

    - name: Upload accessibility results
      uses: actions/upload-artifact@v4
      with:
        name: accessibility-results
        path: accessibility-results/

  # Visual regression testing
  visual-regression:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'yarn'

    - name: Install dependencies
      run: |
        yarn install --frozen-lockfile
        yarn workspace @clinic/common build

    - name: Install Playwright
      run: npx playwright install chromium

    - name: Setup and start services
      run: |
        cp .env.example .env
        docker compose -f docker-compose.test.yml up -d
        sleep 30
        yarn workspace api-gateway start &
        cd frontend && yarn build && yarn preview &
        sleep 20

    - name: Run visual regression tests
      run: npx playwright test --grep "@visual" --project=chromium

    - name: Upload visual diffs
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: visual-diffs
        path: test-results/

  # Notify on failure
  notify:
    needs: [test, merge-reports]
    if: failure() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - name: Send Slack notification
      uses: 8398a7/action-slack@v3
      with:
        status: failure
        channel: '#dev-alerts'
        text: 'Playwright E2E tests failed on main branch'
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    - name: Create GitHub issue
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: 'E2E Tests Failing on Main Branch',
            body: `E2E tests are failing on the main branch. Please check the [workflow run](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`,
            labels: ['bug', 'priority-high', 'testing']
          })