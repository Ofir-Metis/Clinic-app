name: 🏥 Healthcare Platform - AWS ECS Deployment

on:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY_PREFIX: clinic-app

jobs:
  # Build and Push to ECR
  build-and-push:
    name: 🐳 Build & Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔐 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🔑 Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: 🏗️ Build and Push Images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Build and push each service
          services=("api-gateway" "auth-service" "appointments-service" "files-service" "notifications-service" "ai-service" "notes-service" "analytics-service" "settings-service" "billing-service" "frontend")
          
          for service in "${services[@]}"; do
            echo "Building $service..."
            docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_PREFIX-$service:$IMAGE_TAG \
              -f services/$service/Dockerfile.optimized .
            docker push $ECR_REGISTRY/$ECR_REPOSITORY_PREFIX-$service:$IMAGE_TAG
            
            # Tag as latest for the environment
            docker tag $ECR_REGISTRY/$ECR_REPOSITORY_PREFIX-$service:$IMAGE_TAG \
              $ECR_REGISTRY/$ECR_REPOSITORY_PREFIX-$service:${{ github.ref_name }}-latest
            docker push $ECR_REGISTRY/$ECR_REPOSITORY_PREFIX-$service:${{ github.ref_name }}-latest
          done

  # Deploy to ECS
  deploy-ecs:
    name: 🚀 Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔐 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🏗️ Deploy to ECS
        run: |
          # Update ECS service with new image
          ENVIRONMENT=${{ github.ref_name == 'main' && 'production' || 'staging' }}
          CLUSTER_NAME="clinic-app-${ENVIRONMENT}"
          
          # Update each service
          services=("api-gateway" "auth-service" "appointments-service" "files-service" "notifications-service")
          
          for service in "${services[@]}"; do
            echo "Updating ECS service: $service"
            aws ecs update-service \
              --cluster $CLUSTER_NAME \
              --service "${service}-service" \
              --force-new-deployment
            
            # Wait for deployment to complete
            aws ecs wait services-stable \
              --cluster $CLUSTER_NAME \
              --services "${service}-service"
          done

      - name: 🏥 Health Check
        run: |
          ENVIRONMENT=${{ github.ref_name == 'main' && 'production' || 'staging' }}
          LOAD_BALANCER_URL="${ENVIRONMENT}.clinic-app.com"
          
          # Wait for load balancer to be healthy
          for i in {1..30}; do
            if curl -f "https://${LOAD_BALANCER_URL}/health"; then
              echo "Health check passed!"
              break
            fi
            echo "Waiting for health check... ($i/30)"
            sleep 30
          done