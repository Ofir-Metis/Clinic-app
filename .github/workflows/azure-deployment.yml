name: 🏥 Healthcare Platform - Azure Container Apps

on:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production

env:
  AZURE_RESOURCE_GROUP: clinic-app-rg
  AZURE_LOCATION: eastus
  CONTAINER_APP_ENVIRONMENT: clinic-app-env

jobs:
  # Build and Push to ACR
  build-and-push:
    name: 🐳 Build & Push to ACR
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔐 Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: 🔑 Login to ACR
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}

      - name: 🏗️ Build and Push Images
        run: |
          ACR_NAME="${{ secrets.ACR_NAME }}"
          IMAGE_TAG="${{ github.sha }}"
          
          services=("api-gateway" "auth-service" "appointments-service" "files-service" "notifications-service" "frontend")
          
          for service in "${services[@]}"; do
            echo "Building $service for Azure..."
            
            if [ "$service" = "frontend" ]; then
              docker build -t ${ACR_NAME}.azurecr.io/clinic-app-${service}:${IMAGE_TAG} \
                -f frontend/Dockerfile.optimized ./frontend
            else
              docker build -t ${ACR_NAME}.azurecr.io/clinic-app-${service}:${IMAGE_TAG} \
                -f services/${service}/Dockerfile.optimized .
            fi
            
            docker push ${ACR_NAME}.azurecr.io/clinic-app-${service}:${IMAGE_TAG}
          done

  # Deploy to Container Apps
  deploy-azure:
    name: 🚀 Deploy to Container Apps
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔐 Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: 🏗️ Deploy Container Apps
        run: |
          ENVIRONMENT=${{ github.ref_name == 'main' && 'production' || 'staging' }}
          ACR_NAME="${{ secrets.ACR_NAME }}"
          IMAGE_TAG="${{ github.sha }}"
          
          # Deploy API Gateway
          az containerapp update \
            --name clinic-app-api-gateway-${ENVIRONMENT} \
            --resource-group $AZURE_RESOURCE_GROUP \
            --image ${ACR_NAME}.azurecr.io/clinic-app-api-gateway:${IMAGE_TAG} \
            --set-env-vars \
              NODE_ENV=${ENVIRONMENT} \
              POSTGRES_HOST=${{ secrets.POSTGRES_HOST }} \
              POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
              JWT_SECRET=${{ secrets.JWT_SECRET }}

          # Deploy Auth Service  
          az containerapp update \
            --name clinic-app-auth-service-${ENVIRONMENT} \
            --resource-group $AZURE_RESOURCE_GROUP \
            --image ${ACR_NAME}.azurecr.io/clinic-app-auth-service:${IMAGE_TAG}

          # Deploy Frontend
          az containerapp update \
            --name clinic-app-frontend-${ENVIRONMENT} \
            --resource-group $AZURE_RESOURCE_GROUP \
            --image ${ACR_NAME}.azurecr.io/clinic-app-frontend:${IMAGE_TAG}

      - name: 🏥 Health Check
        run: |
          ENVIRONMENT=${{ github.ref_name == 'main' && 'production' || 'staging' }}
          
          # Get the Container App URL
          FRONTEND_URL=$(az containerapp show \
            --name clinic-app-frontend-${ENVIRONMENT} \
            --resource-group $AZURE_RESOURCE_GROUP \
            --query properties.configuration.ingress.fqdn \
            --output tsv)
          
          # Health check
          for i in {1..20}; do
            if curl -f "https://${FRONTEND_URL}/health"; then
              echo "Azure deployment successful!"
              exit 0
            fi
            echo "Waiting for deployment... ($i/20)"
            sleep 30
          done
          
          echo "Health check failed"
          exit 1