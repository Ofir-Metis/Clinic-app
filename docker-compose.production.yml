version: '3.8'

# Healthcare Platform - Complete Production-Grade Local Environment
# This compose file includes all production monitoring, security, and infrastructure components

networks:
  clinic-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:
  elasticsearch-data:
  prometheus-data:
  grafana-data:
  vault-data:
  jaeger-data:

services:
  # ===== INFRASTRUCTURE SERVICES =====
  
  postgres:
    image: postgres:15
    container_name: postgres-primary
    restart: unless-stopped
    networks:
      - clinic-network
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-clinic_db}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: >
      postgres 
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=4MB
      -c huge_pages=off
      -c min_wal_size=1GB
      -c max_wal_size=4GB
      -c max_connections=200
      -c log_statement=all
      -c log_min_duration_statement=1000
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-replica:
    image: postgres:15
    container_name: postgres-replica
    restart: unless-stopped
    networks:
      - clinic-network
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-clinic_db}
      PGUSER: postgres
    volumes:
      - ./scripts/postgres/setup-replica.sh:/docker-entrypoint-initdb.d/setup-replica.sh
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: redis-cluster
    restart: unless-stopped
    networks:
      - clinic-network
    ports:
      - '6379:6379'
    command: >
      redis-server 
      --appendonly yes 
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  nats:
    image: nats:2-alpine
    container_name: nats-server
    restart: unless-stopped
    networks:
      - clinic-network
    ports:
      - '4222:4222'
      - '8222:8222'
      - '6222:6222'
    command: >
      --jetstream
      --store_dir=/data
      --max_payload=8MB
      --max_pending=128MB
      --http_port=8222
      --cluster_name=clinic-cluster
    volumes:
      - ./data/nats:/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: minio-storage
    restart: unless-stopped
    networks:
      - clinic-network
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
      MINIO_BROWSER_REDIRECT_URL: http://localhost:9001
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ===== MONITORING & OBSERVABILITY =====

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    networks:
      - clinic-network
    ports:
      - '9090:9090'
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/rules:/etc/prometheus/rules
      - prometheus-data:/prometheus
    depends_on:
      - node-exporter

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    networks:
      - clinic-network
    ports:
      - '3000:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_INSTALL_PLUGINS: grafana-piechart-panel,grafana-worldmap-panel,grafana-clock-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    networks:
      - clinic-network
    ports:
      - '9100:9100'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    restart: unless-stopped
    networks:
      - clinic-network
    ports:
      - '9093:9093'
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    restart: unless-stopped
    networks:
      - clinic-network
    ports:
      - '16686:16686'
      - '14268:14268'
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: ':9411'
    volumes:
      - jaeger-data:/tmp

  # ===== LOGGING STACK =====

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch
    restart: unless-stopped
    networks:
      - clinic-network
    ports:
      - '9200:9200'
      - '9300:9300'
    environment:
      - discovery.type=single-node
      - cluster.name=clinic-cluster
      - node.name=elasticsearch
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: kibana
    restart: unless-stopped
    networks:
      - clinic-network
    ports:
      - '5601:5601'
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      SERVER_NAME: kibana
    depends_on:
      elasticsearch:
        condition: service_healthy

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: logstash
    restart: unless-stopped
    networks:
      - clinic-network
    ports:
      - '5044:5044'
      - '9600:9600'
    environment:
      LS_JAVA_OPTS: "-Xmx512m -Xms512m"
    volumes:
      - ./monitoring/logstash/pipeline:/usr/share/logstash/pipeline
      - ./monitoring/logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml
    depends_on:
      elasticsearch:
        condition: service_healthy

  # ===== SECURITY SERVICES =====

  vault:
    image: vault:latest
    container_name: vault
    restart: unless-stopped
    networks:
      - clinic-network
    ports:
      - '8200:8200'
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_ROOT_TOKEN:-root-token}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    volumes:
      - vault-data:/vault/data
      - ./security/vault/config:/vault/config
    command: vault server -dev -dev-listen-address=0.0.0.0:8200

  # ===== DEVELOPMENT SERVICES =====

  maildev:
    image: maildev/maildev:latest
    container_name: maildev
    restart: unless-stopped
    networks:
      - clinic-network
    ports:
      - '1080:1080'
      - '1025:1025'
    environment:
      MAILDEV_WEB_PORT: 1080
      MAILDEV_SMTP_PORT: 1025

  # ===== APPLICATION SERVICES =====

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: auth-service
    restart: unless-stopped
    networks:
      - clinic-network
    ports:
      - '3001:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      SERVICE_NAME: auth-service
      # Database
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-clinic_db}
      # Security
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key}
      JWT_EXPIRES_IN: 24h
      BCRYPT_ROUNDS: 12
      # Services
      NATS_URL: nats://nats:4222
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # External APIs
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      # Monitoring
      JAEGER_ENDPOINT: http://jaeger:14268/api/traces
      PROMETHEUS_ENABLED: true
      LOG_LEVEL: info
    volumes:
      - ./logs/auth-service:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  appointments-service:
    build:
      context: .
      dockerfile: services/appointments-service/Dockerfile
    container_name: appointments-service
    restart: unless-stopped
    networks:
      - clinic-network
    ports:
      - '3002:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      SERVICE_NAME: appointments-service
      # Database
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-clinic_db}
      # Services
      NATS_URL: nats://nats:4222
      # External APIs
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      # Email
      SMTP_HOST: maildev
      SMTP_PORT: 1025
      EMAIL_FROM: noreply@clinic.health
      # Monitoring
      JAEGER_ENDPOINT: http://jaeger:14268/api/traces
      LOG_LEVEL: info
    volumes:
      - ./logs/appointments-service:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  files-service:
    build:
      context: .
      dockerfile: services/files-service/Dockerfile
    container_name: files-service
    restart: unless-stopped
    networks:
      - clinic-network
    ports:
      - '3003:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      SERVICE_NAME: files-service
      # Database
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-clinic_db}
      # Storage
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minio}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio123}
      S3_BUCKET: clinic-files
      S3_REGION: us-east-1
      # File Processing
      MAX_FILE_SIZE: 500MB
      ALLOWED_MIME_TYPES: video/mp4,video/mov,video/avi,audio/mp3,audio/wav,audio/m4a,video/webm
      # Monitoring
      JAEGER_ENDPOINT: http://jaeger:14268/api/traces
      LOG_LEVEL: info
    volumes:
      - ./logs/files-service:/app/logs
      - ./data/temp:/app/temp
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  notifications-service:
    build:
      context: .
      dockerfile: services/notifications-service/Dockerfile
    container_name: notifications-service
    restart: unless-stopped
    networks:
      - clinic-network
    ports:
      - '3004:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      SERVICE_NAME: notifications-service
      # Database
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-clinic_db}
      # Services
      NATS_URL: nats://nats:4222
      # External APIs
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      # Email
      SMTP_HOST: maildev
      SMTP_PORT: 1025
      EMAIL_FROM: noreply@clinic.health
      # Monitoring
      JAEGER_ENDPOINT: http://jaeger:14268/api/traces
      LOG_LEVEL: info
    volumes:
      - ./logs/notifications-service:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ai-service:
    build:
      context: .
      dockerfile: services/ai-service/Dockerfile
    container_name: ai-service
    restart: unless-stopped
    networks:
      - clinic-network
    ports:
      - '3005:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      SERVICE_NAME: ai-service
      # Database
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-clinic_db}
      # Services
      NATS_URL: nats://nats:4222
      # AI APIs
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: gpt-4
      WHISPER_MODEL: whisper-1
      # Monitoring
      JAEGER_ENDPOINT: http://jaeger:14268/api/traces
      LOG_LEVEL: info
    volumes:
      - ./logs/ai-service:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  notes-service:
    build:
      context: .
      dockerfile: services/notes-service/Dockerfile
    container_name: notes-service
    restart: unless-stopped
    networks:
      - clinic-network
    ports:
      - '3006:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      SERVICE_NAME: notes-service
      # Database
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-clinic_db}
      # Monitoring
      JAEGER_ENDPOINT: http://jaeger:14268/api/traces
      LOG_LEVEL: info
    volumes:
      - ./logs/notes-service:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  analytics-service:
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile
    container_name: analytics-service
    restart: unless-stopped
    networks:
      - clinic-network
    ports:
      - '3007:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      SERVICE_NAME: analytics-service
      # Database
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-clinic_db}
      # Monitoring
      JAEGER_ENDPOINT: http://jaeger:14268/api/traces
      LOG_LEVEL: info
    volumes:
      - ./logs/analytics-service:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  settings-service:
    build:
      context: .
      dockerfile: services/settings-service/Dockerfile
    container_name: settings-service
    restart: unless-stopped
    networks:
      - clinic-network
    ports:
      - '3008:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      SERVICE_NAME: settings-service
      # Database
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-clinic_db}
      # Security
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key}
      # Monitoring
      JAEGER_ENDPOINT: http://jaeger:14268/api/traces
      LOG_LEVEL: info
    volumes:
      - ./logs/settings-service:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  billing-service:
    build:
      context: .
      dockerfile: services/billing-service/Dockerfile
    container_name: billing-service
    restart: unless-stopped
    networks:
      - clinic-network
    ports:
      - '3009:3009'
    environment:
      NODE_ENV: production
      PORT: 3009
      SERVICE_NAME: billing-service
      # Database
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-clinic_db}
      # Security
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key}
      # Services
      NATS_URL: nats://nats:4222
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Israeli Compliance
      VAT_RATE: 0.18
      CTC_THRESHOLD_NIS: 20000
      # Payment Processing
      TRANZILLA_API_KEY: ${TRANZILLA_API_KEY}
      CARDCOM_API_KEY: ${CARDCOM_API_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      # Notifications
      SMTP_HOST: maildev
      SMTP_PORT: 1025
      EMAIL_FROM: billing@clinic.health
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      # Frontend
      FRONTEND_URL: http://localhost:5173
      # Monitoring
      JAEGER_ENDPOINT: http://jaeger:14268/api/traces
      LOG_LEVEL: info
    volumes:
      - ./logs/billing-service:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3009/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    networks:
      - clinic-network
    ports:
      - '4000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      SERVICE_NAME: api-gateway
      # Database
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-clinic_db}
      # Security
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key}
      FRONTEND_ORIGIN: http://localhost:5173
      # Services
      NATS_URL: nats://nats:4222
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Service URLs
      AUTH_SERVICE_URL: http://auth-service:3000
      APPOINTMENTS_SERVICE_URL: http://appointments-service:3000
      FILES_SERVICE_URL: http://files-service:3000
      NOTIFICATIONS_SERVICE_URL: http://notifications-service:3000
      AI_SERVICE_URL: http://ai-service:3000
      NOTES_SERVICE_URL: http://notes-service:3000
      ANALYTICS_SERVICE_URL: http://analytics-service:3000
      SETTINGS_SERVICE_URL: http://settings-service:3000
      BILLING_SERVICE_URL: http://billing-service:3009
      # Storage
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minio}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio123}
      # AI
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      # WebSocket
      WS_CORS_ORIGIN: http://localhost:5173
      WS_TRANSPORTS: "websocket,polling"
      # Performance Monitoring
      PERFORMANCE_PROFILING_ENABLED: true
      PERFORMANCE_METRICS_INTERVAL: 60000
      # Monitoring
      JAEGER_ENDPOINT: http://jaeger:14268/api/traces
      PROMETHEUS_ENABLED: true
      LOG_LEVEL: info
    volumes:
      - ./logs/api-gateway:/app/logs
    depends_on:
      - auth-service
      - appointments-service
      - files-service
      - notifications-service
      - ai-service
      - notes-service
      - analytics-service
      - settings-service
      - billing-service
      - postgres
      - redis
      - nats
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: frontend
    restart: unless-stopped
    networks:
      - clinic-network
    ports:
      - '5173:80'
    environment:
      # API Configuration
      REACT_APP_API_URL: http://localhost:4000
      REACT_APP_WS_URL: http://localhost:4000
      # Feature Flags
      REACT_APP_ENABLE_WEBSOCKETS: "true"
      REACT_APP_ENABLE_AI_SUMMARIES: "true"
      REACT_APP_ENABLE_RECORDINGS: "true"
      REACT_APP_ENABLE_BILLING: "true"
      # File Upload
      REACT_APP_MAX_FILE_SIZE: 500
      REACT_APP_SUPPORTED_FORMATS: "mp4,mov,avi,mp3,wav,m4a,webm"
      # Monitoring
      REACT_APP_SENTRY_DSN: ${SENTRY_DSN}
      REACT_APP_ANALYTICS_ID: ${GOOGLE_ANALYTICS_ID}
    depends_on:
      - api-gateway
    volumes:
      - ./logs/frontend:/var/log/nginx

  # ===== PERFORMANCE & LOAD TESTING =====

  k6:
    image: grafana/k6:latest
    container_name: k6-load-testing
    restart: "no"
    networks:
      - clinic-network
    environment:
      K6_PROMETHEUS_RW_SERVER_URL: http://prometheus:9090/api/v1/write
      K6_PROMETHEUS_RW_TREND_AS_NATIVE_HISTOGRAM: "true"
    volumes:
      - ./performance/k6:/scripts
      - ./performance/results:/results
    profiles:
      - testing

  # ===== BACKUP & MAINTENANCE =====

  backup-service:
    image: postgres:15
    container_name: backup-service
    restart: "no"
    networks:
      - clinic-network
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-clinic_db}
    volumes:
      - ./backups:/backups
      - ./scripts/backup:/scripts
    command: /scripts/backup-cron.sh
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - maintenance

  # ===== NGINX LOAD BALANCER =====

  nginx:
    image: nginx:alpine
    container_name: nginx-lb
    restart: unless-stopped
    networks:
      - clinic-network
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - api-gateway
      - frontend
    profiles:
      - production