version: '3.8'

# Healthcare Platform - Staging Environment
# Auto-deployed on every push to main/develop branches

services:
  # Core Infrastructure
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: clinic_staging
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
      - ./scripts/init-database.sql:/docker-entrypoint-initdb.d/init-database.sql
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - staging-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_staging_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - staging-network

  nats:
    image: nats:2-alpine
    ports:
      - "${NATS_PORT:-4223}:4222"
      - "${NATS_MONITOR_PORT:-8223}:8222"
    command: ["-js", "-m", "8222"]
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - staging-network

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioAdmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioPassword123}
    ports:
      - "${MINIO_PORT:-9002}:9000"
      - "${MINIO_CONSOLE_PORT:-9003}:9001"
    volumes:
      - minio_staging_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - staging-network

  # Load Balancer
  nginx:
    image: nginx:alpine
    ports:
      - "${HTTP_PORT:-8080}:80"
      - "${HTTPS_PORT:-8443}:443"
    volumes:
      - ./infrastructure/staging/nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
      - staging_logs:/var/log/nginx
    depends_on:
      - api-gateway
    networks:
      - staging-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  # Core Services
  api-gateway:
    image: ${REGISTRY:-ghcr.io}/${REPOSITORY:-clinic-app}/api-gateway:${IMAGE_TAG:-latest}
    environment:
      NODE_ENV: staging
      PORT: 4000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: clinic_staging
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NATS_URL: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioAdmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioPassword123}
      ENVIRONMENT: staging
      LOG_LEVEL: debug
    ports:
      - "${API_GATEWAY_PORT:-4001}:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - staging-network
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  auth-service:
    image: ${REGISTRY:-ghcr.io}/${REPOSITORY:-clinic-app}/auth-service:${IMAGE_TAG:-latest}
    environment:
      NODE_ENV: staging
      PORT: 3001
      POSTGRES_HOST: postgres
      POSTGRES_DB: clinic_staging
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      NATS_URL: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      ENVIRONMENT: staging
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - staging-network

  appointments-service:
    image: ${REGISTRY:-ghcr.io}/${REPOSITORY:-clinic-app}/appointments-service:${IMAGE_TAG:-latest}
    environment:
      NODE_ENV: staging
      PORT: 3002
      POSTGRES_HOST: postgres
      POSTGRES_DB: clinic_staging
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      NATS_URL: nats://nats:4222
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      ENVIRONMENT: staging
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - staging-network

  files-service:
    image: ${REGISTRY:-ghcr.io}/${REPOSITORY:-clinic-app}/files-service:${IMAGE_TAG:-latest}
    environment:
      NODE_ENV: staging
      PORT: 3003
      POSTGRES_HOST: postgres
      POSTGRES_DB: clinic_staging
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      NATS_URL: nats://nats:4222
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioAdmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioPassword123}
      ENVIRONMENT: staging
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - staging-network

  notifications-service:
    image: ${REGISTRY:-ghcr.io}/${REPOSITORY:-clinic-app}/notifications-service:${IMAGE_TAG:-latest}
    environment:
      NODE_ENV: staging
      PORT: 3004
      POSTGRES_HOST: postgres
      POSTGRES_DB: clinic_staging
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      NATS_URL: nats://nats:4222
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      SMTP_HOST: ${SMTP_HOST:-maildev}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      ENVIRONMENT: staging
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - staging-network

  ai-service:
    image: ${REGISTRY:-ghcr.io}/${REPOSITORY:-clinic-app}/ai-service:${IMAGE_TAG:-latest}
    environment:
      NODE_ENV: staging
      PORT: 3005
      POSTGRES_HOST: postgres
      POSTGRES_DB: clinic_staging
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      NATS_URL: nats://nats:4222
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ENVIRONMENT: staging
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - staging-network

  notes-service:
    image: ${REGISTRY:-ghcr.io}/${REPOSITORY:-clinic-app}/notes-service:${IMAGE_TAG:-latest}
    environment:
      NODE_ENV: staging
      PORT: 3006
      POSTGRES_HOST: postgres
      POSTGRES_DB: clinic_staging
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      NATS_URL: nats://nats:4222
      ENVIRONMENT: staging
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - staging-network

  analytics-service:
    image: ${REGISTRY:-ghcr.io}/${REPOSITORY:-clinic-app}/analytics-service:${IMAGE_TAG:-latest}
    environment:
      NODE_ENV: staging
      PORT: 3007
      POSTGRES_HOST: postgres
      POSTGRES_DB: clinic_staging
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      NATS_URL: nats://nats:4222
      ENVIRONMENT: staging
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3007/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - staging-network

  settings-service:
    image: ${REGISTRY:-ghcr.io}/${REPOSITORY:-clinic-app}/settings-service:${IMAGE_TAG:-latest}
    environment:
      NODE_ENV: staging
      PORT: 3008
      POSTGRES_HOST: postgres
      POSTGRES_DB: clinic_staging
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      NATS_URL: nats://nats:4222
      ENVIRONMENT: staging
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3008/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - staging-network

  billing-service:
    image: ${REGISTRY:-ghcr.io}/${REPOSITORY:-clinic-app}/billing-service:${IMAGE_TAG:-latest}
    environment:
      NODE_ENV: staging
      PORT: 3009
      POSTGRES_HOST: postgres
      POSTGRES_DB: clinic_staging
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      NATS_URL: nats://nats:4222
      STRIPE_SECRET_KEY: ${STRIPE_TEST_SECRET_KEY}
      TRANZILLA_TERMINAL: ${TRANZILLA_TEST_TERMINAL}
      TRANZILLA_USERNAME: ${TRANZILLA_TEST_USERNAME}
      ENVIRONMENT: staging
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3009/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - staging-network

  search-service:
    image: ${REGISTRY:-ghcr.io}/${REPOSITORY:-clinic-app}/search-service:${IMAGE_TAG:-latest}
    environment:
      NODE_ENV: staging
      PORT: 3010
      POSTGRES_HOST: postgres
      POSTGRES_DB: clinic_staging
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      NATS_URL: nats://nats:4222
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ENVIRONMENT: staging
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3010/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - staging-network

  cdn-service:
    image: ${REGISTRY:-ghcr.io}/${REPOSITORY:-clinic-app}/cdn-service:${IMAGE_TAG:-latest}
    environment:
      NODE_ENV: staging
      CDN_PORT: 3011
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      CDN_S3_BUCKET: ${CDN_S3_BUCKET:-clinic-cdn-staging}
      CLOUDFRONT_DISTRIBUTION_ID: ${CLOUDFRONT_STAGING_DISTRIBUTION_ID}
      CLOUDFRONT_DOMAIN: ${CLOUDFRONT_STAGING_DOMAIN}
      ENVIRONMENT: staging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3011/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - staging-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.name=clinic-staging
    ports:
      - "${ELASTICSEARCH_PORT:-9201}:9200"
    volumes:
      - elasticsearch_staging_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - staging-network

  # Frontend
  frontend:
    image: ${REGISTRY:-ghcr.io}/${REPOSITORY:-clinic-app}/frontend:${IMAGE_TAG:-latest}
    environment:
      NODE_ENV: staging
      VITE_API_URL: ${STAGING_API_URL:-http://localhost:4001}
      VITE_WS_URL: ${STAGING_WS_URL:-ws://localhost:4001}
      VITE_ENVIRONMENT: staging
    ports:
      - "${FRONTEND_PORT:-5174}:80"
    depends_on:
      - api-gateway
    networks:
      - staging-network

  # Monitoring Stack for Staging
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "${PROMETHEUS_PORT:-9091}:9090"
    volumes:
      - ./monitoring/prometheus.staging.yml:/etc/prometheus/prometheus.yml
      - prometheus_staging_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - staging-network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_STAGING_PASSWORD:-staging123}
      GF_SERVER_DOMAIN: staging.clinic-app.com
      GF_SERVER_ROOT_URL: http://staging.clinic-app.com:3001
    volumes:
      - grafana_staging_data:/var/lib/grafana
      - ./monitoring/grafana/staging:/etc/grafana/provisioning
    networks:
      - staging-network

  # Testing Tools
  maildev:
    image: maildev/maildev
    ports:
      - "${MAILDEV_SMTP_PORT:-1026}:1025"
      - "${MAILDEV_WEB_PORT:-1081}:1080"
    networks:
      - staging-network

volumes:
  postgres_staging_data:
  redis_staging_data:
  minio_staging_data:
  elasticsearch_staging_data:
  prometheus_staging_data:
  grafana_staging_data:
  staging_logs:

networks:
  staging-network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: staging-bridge