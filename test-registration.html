<!DOCTYPE html>
<html>
<head>
    <title>Test Registration</title>
</head>
<body>
    <h1>Registration Test</h1>
    <form id="regForm">
        <input type="text" id="name" placeholder="Name" required><br><br>
        <input type="email" id="email" placeholder="Email" required><br><br>
        <input type="password" id="password" placeholder="Password" required><br><br>
        <input type="password" id="confirmPassword" placeholder="Confirm Password" required><br><br>
        <select id="role">
            <option value="therapist">Therapist</option>
            <option value="patient">Patient</option>
        </select><br><br>
        <button type="submit">Register</button>
    </form>
    
    <div id="result"></div>
    
    <script>
        const API_URL = 'http://10.100.102.17:4000';
        
        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const result = document.getElementById('result');
            result.innerHTML = 'Registering...';
            
            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                confirmPassword: document.getElementById('confirmPassword').value,
                role: document.getElementById('role').value
            };
            
            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData),
                    credentials: 'include'
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    result.innerHTML = `<p style="color: green;">Success! Token: ${data.access_token.substring(0, 50)}...</p>`;
                    
                    // Test login process
                    const userData = {
                        id: 'registered',
                        email: formData.email,
                        role: formData.role === 'patient' ? 'client' : 'coach',
                        name: formData.name
                    };
                    
                    const tokens = {
                        accessToken: data.access_token,
                        refreshToken: data.access_token,
                        expiresIn: 3600
                    };
                    
                    // Save to localStorage
                    localStorage.setItem('accessToken', tokens.accessToken);
                    localStorage.setItem('refreshToken', tokens.refreshToken);
                    localStorage.setItem('user', JSON.stringify(userData));
                    
                    result.innerHTML += '<p style="color: blue;">Saved to localStorage!</p>';
                    result.innerHTML += `<p>Check localStorage: accessToken = ${localStorage.getItem('accessToken') ? 'EXISTS' : 'NOT FOUND'}</p>`;
                } else {
                    result.innerHTML = `<p style="color: red;">Error: ${JSON.stringify(data)}</p>`;
                }
            } catch (error) {
                result.innerHTML = `<p style="color: red;">Network Error: ${error.message}</p>`;
                console.error('Registration error:', error);
            }
        });
    </script>
</body>
</html>
