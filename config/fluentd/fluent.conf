# Fluentd configuration for clinic app logging
<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>

<source>
  @type tail
  path /var/log/containers/*.log
  pos_file /var/log/fluentd-containers.log.pos
  tag docker.containers
  format json
  time_format %Y-%m-%dT%H:%M:%S.%NZ
</source>

<filter **>
  @type record_transformer
  <record>
    hostname ${hostname}
    environment production
  </record>
</filter>

<match **>
  @type stdout
  @log_level info
</match>

# Healthcare compliance logging
<match clinic.**>
  @type file
  path /var/log/clinic/audit
  append true
  time_slice_format %Y%m%d
  time_slice_wait 10m
  time_format %Y-%m-%dT%H:%M:%S%z
  buffer_chunk_limit 256m
  buffer_queue_limit 128
  flush_interval 3s
  max_retry_wait 30
  disable_retry_limit
  num_threads 8
</match>